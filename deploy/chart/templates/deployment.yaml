apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ecr-ptc-webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ecr-ptc-webhook.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ecr-ptc-webhook.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/registries: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ecr-ptc-webhook.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "ecr-ptc-webhook.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webhook
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1001
            runAsGroup: 1001
            capabilities:
              drop: [ALL]
          env:
            - name: ECR_REGISTRY_ACCOUNT_ID
              value: {{ required "awsAccountId is required" .Values.awsAccountId | quote }}
            - name: ECR_REGISTRY_REGION
              value: {{ required "awsRegion is required" .Values.awsRegion | quote }}
            - name: REGISTRIES_CONFIG_PATH
              value: /config/registries.yaml
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: METRICS_PORT
              value: {{ .Values.metrics.service.port | quote }}
          ports:
            - name: https
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metrics.service.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
            - name: registries
              mountPath: /config
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tls
          secret:
            secretName: {{ include "ecr-ptc-webhook.tlsSecretName" . }}
        - name: registries
          configMap:
            name: {{ include "ecr-ptc-webhook.fullname" . }}-registries
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
