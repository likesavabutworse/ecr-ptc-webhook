apiVersion: v1
kind: Service
metadata:
  name: {{ include "ecr-ptc-webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ecr-ptc-webhook.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "ecr-ptc-webhook.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ecr-ptc-webhook.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ecr-ptc-webhook.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  selector:
    {{- include "ecr-ptc-webhook.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.metrics.service.port }}
      targetPort: metrics
      protocol: TCP
